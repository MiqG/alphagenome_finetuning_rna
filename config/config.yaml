# GENERAL
paths:
  RAW_DIR: "data/raw"
  PREP_DIR: "data/prep"

variables:
  CHROMOSOMES: ["chr1", "chr2", "chr3", "chr4", "chr5", "chr6", "chr7", "chr8", "chr9", "chr10", "chr11", "chr12", "chr13", "chr14", "chr15", "chr16", "chr17", "chr18", "chr19", "chr20", "chr21", "chr22", "chrX", "chrY"]
  ALPHAGENOME_FOLDS: ["FOLD_1"]
  
# DATASET SPECIFIC
gencode:
  urls:
    fasta: "https://ftp.ebi.ac.uk/pub/databases/gencode/Gencode_human/release_46/GRCh38.primary_assembly.genome.fa.gz"
    gtf: "https://ftp.ebi.ac.uk/pub/databases/gencode/Gencode_human/release_46/gencode.v46.annotation.gtf.gz"
  paths:
    fasta: "data/raw/GENCODE/release_46/GRCh38.primary_assembly.genome.fa.gz"
    gtf: "data/raw/GENCODE/release_46/gencode.v46.annotation.gtf.gz"
    gtf_parquet: "data/raw/GENCODE/release_46/gencode.v46.annotation.gtf.parquet"
    star_index: "data/raw/GENCODE/release_46/star_index"

rnaseq:
  hepg2:
    path: "data/raw/ENCODE/hepg2"
  sf3b1mut:
    metadata: "support/ENA_filereport-compendium-sf3b1mut.tsv"
    path: "data/raw/ENA/sf3b1mut"

alphagenome_pytorch:
  urls:
    repository: "gtca/alphagenome_pytorch"
    weights: "model_fold_1.safetensors"
  paths:
    weights: "data/raw/articles/Avsec2026/alphagenome_pytorch/fold-1/model_fold_1.safetensors"

finetuning:
  alphagenome:
    finetune_script: "src/alphagenome-pytorch/scripts/finetune.py"
    convert_folds_script: "src/alphagenome-pytorch/scripts/convert_borzoi_folds.py"
    sequences_bed_url: "https://github.com/calico/borzoi/raw/5c9358222b5026abb733ed5fb84f3f6c77239b37/data/sequences_human.bed.gz"
    sequences_bed_gz: "data/prep/finetuning/sequences_human.bed.gz"
    folds_dir: "data/prep/finetuning/alphagenome"
    sf3b1mut:
      output_dir: "results/finetuning/alphagenome_pytorch/sf3b1mut"
      num_gpus: 4
      modality_bigwig: "rna_seq"
      modality_splicing: "splice_site,splice_usage,splice_junctions"
      sequence_length: 1048576
      overlap_highres: 1024
      lr: 1e-4
      warmup_steps: 200
      epochs: 5
      batch_size: 1
      gradient_accumulation_steps: 16
      track_means_samples: 1000  # deterministic every-Nth subset; sufficient for mean estimation
      save_every_steps: 250

preprocessing:
  overfitting:
    samples: ["SRR17111303", "SRR17111311"]
    fold: "FOLD_1"
    single:
      output_dir: "data/prep/overfitting/single"
      densities: ["high", "medium", "low"]

examples:
  alphagenome:
    output_dir: "results/examples/alphagenome_pytorch"
    track_metadata: "data/raw/articles/Avsec2026/alphagenome_pytorch/track_metadata.parquet"
